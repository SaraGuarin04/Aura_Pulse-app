<div class="auth-container">
    <div class="auth-card">
        <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">Hello, Aura_Pulse-app</h1>

        <h1>Bienvenido</h1>
        <p>Ingresa o crea tu cuenta</p>

        <div class="tabs">
            <button class="tab active">Login</button>
            <button class="tab">Registro</button>
        </div>

        <form class="auth-form">
            <div class="form-group">
                <label for="name">Usuario</label>
                <input [(ngModel)]="user" id="user" type="text" placeholder="Ingresa tu usuario" name="user" />
            </div>

            <div class="form-group">
                <label for="email">Password {{error}}</label>
                <input [(ngModel)]="password" id="password" type="password" placeholder="Ingresa tu contraseña"
                    name="password" />
            </div>
            <button type="submit" class="submit-btn" (click)="sendLogin()">
                Ingresar
            </button>
        </form>
    </div>
</div>
