<div class="auth-container">
    <div class="auth-card">
        <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">Hello, Aura_Pulse-app</h1>

        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
            </svg>
        </div>

        <h1>{{ isLoginMode ? 'Bienvenido' : 'Crear Cuenta' }}</h1>
        <p>{{ isLoginMode ? 'Ingresa a tu cuenta' : 'Regístrate para comenzar' }}</p>

        <div class="tabs">
            <button class="tab" [class.active]="isLoginMode" (click)="isLoginMode = true">Login</button>
            <button class="tab" [class.active]="!isLoginMode" (click)="isLoginMode = false">Registro</button>
        </div>

        <form class="auth-form" (submit)="$event.preventDefault()">
            
            @if (!isLoginMode) {
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input [(ngModel)]="name" id="name" type="text" placeholder="Ingresa tu nombre" name="name" />
                </div>
            }

            <div class="form-group">
                <label for="user">Correo electrónico</label>
                <input [(ngModel)]="user" id="user" type="email" placeholder="Ingresa tu correo" name="user" />
            </div>

            <div class="form-group">
                <label for="password">Password {{error}}</label>
                <input [(ngModel)]="password" id="password" type="password" placeholder="Ingresa tu contraseña" name="password" />
            </div>

            <button type="submit" class="submit-btn" (click)="handleSubmit()">
                {{ isLoginMode ? 'Ingresar' : 'Registrarse' }}
            </button>
        </form>
    </div>
</div>
